<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>动画行业发展｜Figma 成帧交互版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-level="works">
  <main class="figma-page" aria-label="动画行业发展信息可视化长页">
    <img class="figma-frame" src="assets/figma/frame-19.png" alt="项目封面与研究说明">
    <img class="figma-frame" src="assets/figma/frame-22.png" alt="研究问题">

    <section class="interactive-frame timeline-frame" id="timeline" aria-label="五个动画工业阶段">
      <img class="figma-frame" src="assets/figma/frame-28.png" alt="动画工业五阶段时间线与人工智能制作环节">

      <button class="level-hotspot level-hotspot--works is-active" type="button" data-level-target="works" aria-label="切换到 Level 1 代表作品" aria-pressed="true"></button>
      <button class="level-hotspot level-hotspot--tech" type="button" data-level-target="tech" aria-label="切换到 Level 2 制作技术" aria-pressed="false"></button>

      <div class="stage-components" aria-label="五个时期卡片">
        <button class="stage-card stage-card--t1 stage-card--orange" type="button" data-stage="t1" aria-label="打开 T1 手工逐格与摄影台生产详情">
          <span class="stage-card-layer">
            <span class="stage-card-art" aria-hidden="true"><img src="assets/figma/components/sticky-source.png" alt=""></span>
            <span class="stage-card-copy">
              <strong>手工逐格与摄影台生产</strong>
              <span class="stage-card-time" aria-hidden="true">
                <span class="stage-time-point"><span class="stage-time-number">1920</span><span class="stage-time-s">s</span></span>
                <span class="stage-time-line"></span>
                <span class="stage-time-point"><span class="stage-time-number">1950</span><span class="stage-time-s">s</span></span>
              </span>
            </span>
          </span>
        </button>
        <button class="stage-card stage-card--t2 stage-card--yellow" type="button" data-stage="t2" aria-label="打开 T2 手工媒材与美术片工艺详情">
          <span class="stage-card-layer">
            <span class="stage-card-art" aria-hidden="true"><img src="assets/figma/components/sticky-source.png" alt=""></span>
            <span class="stage-card-copy">
              <strong>手工媒材与美术片工艺</strong>
              <span class="stage-card-time" aria-hidden="true">
                <span class="stage-time-point"><span class="stage-time-number">1950</span><span class="stage-time-s">s</span></span>
                <span class="stage-time-line"></span>
                <span class="stage-time-point"><span class="stage-time-number">1980</span><span class="stage-time-s">s</span></span>
              </span>
            </span>
          </span>
        </button>
        <button class="stage-card stage-card--t3 stage-card--orange" type="button" data-stage="t3" aria-label="打开 T3 二维数字动画与无纸化制作详情">
          <span class="stage-card-layer">
            <span class="stage-card-art" aria-hidden="true"><img src="assets/figma/components/sticky-source.png" alt=""></span>
            <span class="stage-card-copy">
              <strong>二维数字动画与无纸化制作</strong>
              <span class="stage-card-time" aria-hidden="true">
                <span class="stage-time-point"><span class="stage-time-number">1990</span><span class="stage-time-s">s</span></span>
                <span class="stage-time-line"></span>
                <span class="stage-time-now">NOW</span>
              </span>
            </span>
          </span>
        </button>
        <button class="stage-card stage-card--t4 stage-card--yellow" type="button" data-stage="t4" aria-label="打开 T4 三维CG与动画工业化详情">
          <span class="stage-card-layer">
            <span class="stage-card-art" aria-hidden="true"><img src="assets/figma/components/sticky-source.png" alt=""></span>
            <span class="stage-card-copy">
              <strong>三维CG与动画工业化</strong>
              <span class="stage-card-time" aria-hidden="true">
                <span class="stage-time-point"><span class="stage-time-number">2015</span></span>
                <span class="stage-time-line"></span>
                <span class="stage-time-now">NOW</span>
              </span>
            </span>
          </span>
        </button>
        <button class="stage-card stage-card--t5 stage-card--yellow" type="button" data-stage="t5" aria-label="打开 T5 多模态人工智能与人机协同详情">
          <span class="stage-card-layer">
            <span class="stage-card-art" aria-hidden="true"><img src="assets/figma/components/sticky-source.png" alt=""></span>
            <span class="stage-card-copy">
              <strong>多模态人工智能与人机协同</strong>
              <span class="stage-card-time" aria-hidden="true">
                <span class="stage-time-point"><span class="stage-time-number">2023</span></span>
                <span class="stage-time-line"></span>
                <span class="stage-time-now">NOW</span>
              </span>
            </span>
          </span>
        </button>
      </div>

      <div class="ai-components" aria-label="人工智能参与动画制作的八个环节">
        <button class="image-hotspot ai-component ai-component--script" type="button" data-detail-kind="ai" data-detail-src="assets/figma/details-transparent/ai-script.png" data-detail-alt="人工智能与剧本环节详情" aria-label="打开剧本环节详情"><img src="assets/figma/components/ai-script.png" alt=""></button>
        <button class="image-hotspot ai-component ai-component--character" type="button" data-detail-kind="ai" data-detail-src="assets/figma/details-transparent/ai-character.png" data-detail-alt="人工智能与角色环节详情" aria-label="打开角色环节详情"><img src="assets/figma/components/ai-character.png" alt=""></button>
        <button class="image-hotspot ai-component ai-component--music" type="button" data-detail-kind="ai" data-detail-src="assets/figma/details-transparent/ai-music.png" data-detail-alt="人工智能与配乐环节详情" aria-label="打开配乐环节详情"><img src="assets/figma/components/ai-music.png" alt=""></button>
        <button class="image-hotspot ai-component ai-component--scene" type="button" data-detail-kind="ai" data-detail-src="assets/figma/details-transparent/ai-scene.png" data-detail-alt="人工智能与场景环节详情" aria-label="打开场景环节详情"><img src="assets/figma/components/ai-scene.png" alt=""></button>
        <button class="image-hotspot ai-component ai-component--post" type="button" data-detail-kind="ai" data-detail-src="assets/figma/details-transparent/ai-post.png" data-detail-alt="人工智能与后期环节详情" aria-label="打开后期环节详情"><img src="assets/figma/components/ai-post.png" alt=""></button>
        <button class="image-hotspot ai-component ai-component--publicity" type="button" data-detail-kind="ai" data-detail-src="assets/figma/details-transparent/ai-publicity.png" data-detail-alt="人工智能与宣传环节详情" aria-label="打开宣传环节详情"><img src="assets/figma/components/ai-publicity.png" alt=""></button>
        <button class="image-hotspot ai-component ai-component--motion" type="button" data-detail-kind="ai" data-detail-src="assets/figma/details-transparent/ai-motion.png" data-detail-alt="人工智能与动作环节详情" aria-label="打开动作环节详情"><img src="assets/figma/components/ai-motion.png" alt=""></button>
        <button class="image-hotspot ai-component ai-component--storyboard" type="button" data-detail-kind="ai" data-detail-src="assets/figma/details-transparent/ai-storyboard.png" data-detail-alt="人工智能与分镜环节详情" aria-label="打开分镜环节详情"><img src="assets/figma/components/ai-storyboard.png" alt=""></button>
      </div>
    </section>

    <section class="interactive-frame recruitment-overview-frame" aria-label="人工智能能力出现在部分公开招聘要求中">
      <img class="figma-frame" src="assets/figma/frame-33.png" alt="人工智能招聘要求数量">
      <div class="recruitment-overview-copy">
        <span class="recruitment-overview-title recruitment-overview-title--baseline">传统岗位基线：</span>
        <span class="recruitment-overview-title recruitment-overview-title--hybrid">传统名称 + AI能力：</span>
        <span class="recruitment-overview-title recruitment-overview-title--explicit">显性AI/AIGC岗位：</span>

        <span class="recruitment-overview-note recruitment-overview-note--baseline">岗位名称和主要职责仍以传统<br>二、三维、剪辑或后期流程为主</span>
        <span class="recruitment-overview-note recruitment-overview-note--hybrid">岗位名称保持传统称呼，但职责<br>或工具要求已经出现AI能力</span>
        <span class="recruitment-overview-note recruitment-overview-note--explicit">名称直接出现AIGC或人工智能</span>
      </div>
    </section>
    <section class="interactive-frame recruitment-frame" aria-label="人工智能能力对应的招聘岗位名称分布">
      <img class="figma-frame" src="assets/figma/frame-35.png" alt="人工智能岗位名称分布">
      <div class="recruitment-labels">
        <span>AI动画与生成制作</span>
        <span>AI漫画与短剧制作</span>
        <span>AI剪辑与后期</span>
        <span>AI分镜与视觉设计</span>
        <span>AI导演制片与管理</span>
      </div>
    </section>
    <section class="interactive-frame salary-frame" aria-label="责任迁移与薪资结构">
      <img class="figma-frame" src="assets/figma/frame-41.png" alt="责任迁移与薪资结构">
      <div class="salary-high-correction" aria-label="3年以上经验门槛：显性AI岗位15.50K，传统名称加AI能力20.00K，传统岗位基线20.00K">
        <span class="salary-high-value salary-high-value--explicit">15.50K</span>
        <span class="salary-high-value salary-high-value--hybrid">20.00K</span>
        <span class="salary-high-value salary-high-value--baseline">20.00K</span>
      </div>
    </section>

    <section class="interactive-frame question-frame" id="questions" aria-label="未来与五类重构问题">
      <img class="figma-frame" src="assets/figma/frame-42.png" alt="未来与五类重构问题">
      <button class="image-hotspot question-component question-component--flow" type="button" data-detail-kind="question" data-detail-src="assets/figma/details-transparent/question-flow.png" data-detail-alt="流程重构详情" aria-label="打开流程重构详情"><img src="assets/figma/components/ticket-flow.png" alt=""><span class="ticket-label">流程重构</span></button>
      <button class="image-hotspot question-component question-component--job" type="button" data-detail-kind="question" data-detail-src="assets/figma/details-transparent/question-job.png" data-detail-alt="岗位重构详情" aria-label="打开岗位重构详情"><img src="assets/figma/components/ticket-job.png" alt=""><span class="ticket-label">岗位重构</span></button>
      <button class="image-hotspot question-component question-component--collab" type="button" data-detail-kind="question" data-detail-src="assets/figma/details-transparent/question-collab.png" data-detail-alt="协作重构详情" aria-label="打开协作重构详情"><img src="assets/figma/components/ticket-collab.png" alt=""><span class="ticket-label">协作重构</span></button>
      <button class="image-hotspot question-component question-component--management" type="button" data-detail-kind="question" data-detail-src="assets/figma/details-transparent/question-management.png" data-detail-alt="管理重构详情" aria-label="打开管理重构详情"><img src="assets/figma/components/ticket-management.png" alt=""><span class="ticket-label">管理重构</span></button>
      <button class="image-hotspot question-component question-component--responsibility" type="button" data-detail-kind="question" data-detail-src="assets/figma/details-transparent/question-responsibility.png" data-detail-alt="责任重构详情" aria-label="打开责任重构详情"><img src="assets/figma/components/ticket-responsibility.png" alt=""><span class="ticket-label">责任重构</span></button>
    </section>
  </main>

  <div class="detail-overlay" id="detail-overlay" hidden>
    <button class="detail-backdrop" type="button" aria-label="关闭详情"></button>
    <section class="detail-panel" role="dialog" aria-modal="true" aria-label="图片详情">
      <button class="detail-close" type="button" aria-label="关闭详情">×</button>
      <img id="detail-image" alt="">
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
